version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  commands:
    - mkdir --parents _readthedocs/html/
    - ls docs/
    - ls docs/pre_built_html/
    - cp --recursive docs/pre_built_html/* _readthedocs/html/

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false
